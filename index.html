<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGL Treasure Collector</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      font-family: Arial, sans-serif;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 14px;
      border-radius: 8px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div><strong>Treasure Collector</strong></div>
    <div>WASD to move</div>
  </div>

  <canvas id="glCanvas"></canvas>
  <!-- ================= VERTEX SHADER ================= -->
<script id="vertex-shader" type="x-shader/x-vertex">
precision mediump float;

attribute vec3 coordinates;
attribute vec3 normal;
attribute vec2 textureCoordinates;
attribute vec3 tangent;

uniform mat4 modelMatrix;
uniform mat4 viewMatrix;
uniform mat4 projectionMatrix;

varying vec2 vTexCoord;
varying vec3 vFragPos;
varying vec3 vNormal;
varying vec3 vTangent;

void main() {
    vec4 worldPos = modelMatrix * vec4(coordinates, 1.0);

    vFragPos = worldPos.xyz;
    vNormal = mat3(modelMatrix) * normal;
    vTangent = mat3(modelMatrix) * tangent;
    vTexCoord = textureCoordinates;

    gl_Position = projectionMatrix * viewMatrix * worldPos;
}
</script>

<!-- ================= FRAGMENT SHADER ================= -->
<script id="fragment-shader" type="x-shader/x-fragment">
precision mediump float;

varying vec2 vTexCoord;
varying vec3 vFragPos;
varying vec3 vNormal;
varying vec3 vTangent;

uniform sampler2D uTexture;
uniform sampler2D uNormalMap;

uniform vec3 lightPos;
uniform vec3 viewPos;

uniform float uBumpStrength;

void main() {

    // NORMAL MAP
    vec3 normalMap = texture2D(uNormalMap, vTexCoord).rgb;
    normalMap = normalMap * 2.0 - 1.0;

    vec3 T = normalize(vTangent);
    vec3 N = normalize(vNormal);
    vec3 B = normalize(cross(N, T));

    mat3 TBN = mat3(T, B, N);

    vec3 finalNormal = normalize(TBN * normalMap);
    finalNormal = mix(N, finalNormal, uBumpStrength);

    // LIGHTING
    vec3 lightDir = normalize(lightPos - vFragPos);
    float diff = max(dot(finalNormal, lightDir), 0.0);

    vec3 viewDir = normalize(viewPos - vFragPos);
    vec3 reflectDir = reflect(-lightDir, finalNormal);
    float spec = pow(max(dot(viewDir, reflectDir), 0.0), 32.0);

    vec3 color = texture2D(uTexture, vTexCoord).rgb;

    vec3 ambient = 0.2 * color;
    vec3 diffuse = diff * color;
    vec3 specular = vec3(0.6) * spec;

    gl_FragColor = vec4(ambient + diffuse + specular, 1.0);
}
</script>
  <script type="module" src="./main.js"></script>
</body>
</html>
